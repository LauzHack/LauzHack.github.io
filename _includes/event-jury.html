{% assign jury = site.data.mini_hackathons[page.event].jury %}
{% if jury %}
<style>
  .jury-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(220px, 320px));
    justify-content: center;
    gap: 1.5em;
    margin: 2em 0;
  }
  .jury-card img { width: 100%; height: 260px; object-fit: cover; display: block; }
  .jury-content { padding: 1em 1em 0 1em; }
  .jury-content h3 { margin: 0; font-size: 1.15em; }
  .jury-role { margin-top: 0.35em; color: #666; font-size: 0.92em; line-height: 1.35; }
  @media (max-width: 700px) { .jury-grid { grid-template-columns: 1fr; } }
</style>
<div class="jury-grid">
  {% for member in jury %}
  <div class="jury-card">
    <a href="{{ member.link }}" target="_blank" rel="noreferrer">
      <img src="{{ member.image }}" alt="{{ member.name }}">
      <div class="jury-content">
        <h3>{{ member.name }}</h3>
        <div class="jury-role">{{ member.role }}<br>{{ member.affiliation }}</div>
      </div>
    </a>
  </div>
  {% endfor %}
</div>
{% endif %}
